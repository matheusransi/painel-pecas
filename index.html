
<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Painel de Peças</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/papaparse@5.4.1/papaparse.min.js"></script>

<style>
body{
font-family:'Inter',sans-serif;
margin:0;
background:#0f0f10;
color:#fff;
display:flex;
}

.sidebar{
width:220px;
background:#000;
height:100vh;
border-right:3px solid #e30613;
padding-top:20px;
}

.sidebar button{
width:100%;
background:none;
border:none;
color:white;
padding:15px 20px;
text-align:left;
cursor:pointer;
font-size:14px;
}

.sidebar button:hover{
background:#e30613;
}

.main{
flex:1;
}

header{
background:#000;
padding:22px;
font-size:22px;
font-weight:600;
border-bottom:3px solid #e30613;
}

.container{
padding:30px;
max-width:1300px;
margin:auto;
}

.cards{
display:flex;
gap:20px;
margin-bottom:30px;
flex-wrap:wrap;
}

.card{
background:#18181b;
padding:24px;
border-radius:16px;
flex:1;
min-width:200px;
border:1px solid #27272a;
box-shadow:0 10px 20px rgba(0,0,0,0.35);
}

.tabs button{
background:#18181b;
border:1px solid #27272a;
padding:10px 18px;
margin-right:10px;
color:#fff;
border-radius:10px;
cursor:pointer;
}

.section{
background:#18181b;
padding:24px;
border-radius:16px;
margin-top:10px;
border:1px solid #27272a;
}

table{
width:100%;
border-collapse:collapse;
margin-top:15px;
}

th,td{
padding:12px;
border-bottom:1px solid #27272a;
}

.hidden{display:none}
</style>
</head>

<body>

<div class="sidebar">
<button onclick="abrirPagina('pecas')">Controle de Peças</button>
<button onclick="abrirPagina('estoque')">Estoque</button>
</div>

<div class="main">

<header>Painel de Controle de Peças</header>

<div id="paginaPecas">
<div class="container">
<h2>Controle de Peças</h2>
<p>Seu sistema original continua aqui.</p>
</div>
</div>

<div id="paginaEstoque" style="display:none">
<div class="container">

<h2>Estoque</h2>

<div class="cards">
<div class="card"><span>Total peças</span><h2 id="eTotal">0</h2></div>
<div class="card"><span>No estoque</span><h2 id="eEstoque">0</h2></div>
<div class="card"><span>Retiradas</span><h2 id="eRetiradas">0</h2></div>
</div>

<table>
<thead>
<tr>
<th>Locação</th>
<th>Marca</th>
<th>Modelo</th>
<th>Peça</th>
<th>Código</th>
<th>Valor</th>
</tr>
</thead>
<tbody id="tEstoque"></tbody>
</table>

</div>
</div>

</div>

<script>

function abrirPagina(p){
document.getElementById("paginaPecas").style.display = p==="pecas"?"block":"none";
document.getElementById("paginaEstoque").style.display = p==="estoque"?"block":"none";
}

</script>

</body>
</html>
