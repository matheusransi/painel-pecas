<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Estoque FINAL PRO</title>
<script src="https://cdn.jsdelivr.net/npm/papaparse@5.4.1/papaparse.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body{font-family:Arial;background:#0b0b0c;color:#fff;margin:0}
header{padding:20px;border-bottom:2px solid red;font-weight:600}
.container{padding:25px}

.cards{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(180px,1fr));
gap:12px;
}

.card{
background:#121214;
padding:15px;
border-radius:12px;
border:1px solid #222;
}

.section{margin-top:25px}

table{width:100%;border-collapse:collapse;margin-top:10px}
th,td{padding:10px;border-bottom:1px solid #222}

button{
background:#18181b;
border:1px solid #333;
color:#fff;
padding:10px 14px;
border-radius:10px;
cursor:pointer;
}

button:hover{background:#e30613}

.actions{
margin-top:20px;
display:flex;
gap:10px;
}

.hidden{display:none}

canvas{
background:#121214;
padding:10px;
border-radius:12px;
}

/* MENU */
#sideMenu{
position:fixed;
top:0;
left:-250px;
width:250px;
height:100%;
background:#0b0b0b;
transition:0.3s;
z-index:999;
}

.menu-item{
display:block;
padding:15px;
color:#fff;
text-decoration:none;
}

.menu-item:hover{background:#e30613;}
.menu-item.active{background:#e30613;}
</style>
</head>

<body>

<!-- BOTÃO MENU -->
<button onclick="toggleMenu()" 
style="position:fixed;top:20px;left:20px;z-index:1000;background:none;border:none;color:#fff;font-size:22px;">
☰
</button>

<!-- MENU -->
<div id="sideMenu">
<div style="display:flex;justify-content:space-between;padding:15px;">
<span>Menu</span>
<button onclick="toggleMenu()" style="background:none;border:none;color:#fff;">✕</button>
</div>

<a href="index.html" class="menu-item">Solicitação</a>
<a href="estoque.html" class="menu-item active">Estoque</a>
<a href="registro.html" class="menu-item">Registro</a>
</div>

<header>Dashboard Completo</header>

<div class="container">

<!-- CARDS -->
<div class="cards">
<div class="card">Total<h2 id="total"></h2></div>
<div class="card">Retiradas<h2 id="ret"></h2></div>
<div class="card">Hoje<h2 id="hoje"></h2></div>
</div>

<!-- 🔥 BOTÕES AGORA AQUI (ANTES DOS RANKINGS) -->
<div class="actions">
<button onclick="mostrar('estoque')">Estoque</button>
<button onclick="mostrar('os')">Buscar OS</button>
<button onclick="mostrar('mov')">Movimento</button>
</div>

<!-- RANKING -->
<div class="section">
<h3>Ranking Top 5 carros</h3>
<table>
<thead><tr><th>Marca / Modelo</th><th>Quantidade</th></tr></thead>
<tbody id="rankingTabela"></tbody>
</table>
</div>

<div class="section">
<h3>Top 5 carros</h3>
<canvas id="grafico"></canvas>
</div>

<!-- ABA ESTOQUE -->
<div id="estoque" class="section hidden">
<table>
<thead>
<tr>
<th>NUM</th>
<th>MARCA</th>
<th>MODELO</th>
<th>OS</th>
<th>PEÇA</th>
<th>RESP</th>
</tr>
</thead>
<tbody id="tEstoque"></tbody>
</table>
</div>

<!-- ABA OS -->
<div id="os" class="section hidden">
<select id="osSelect" onchange="buscarOS()"></select>
<div id="resumo"></div>
<table><tbody id="tOS"></tbody></table>
</div>

<!-- ABA MOVIMENTO -->
<div id="mov" class="section hidden">
<select id="dataSelect" onchange="filtrarData()"></select>
<table><tbody id="tMov"></tbody></table>
</div>

</div>

<script>

let menu=false;
function toggleMenu(){
let m=document.getElementById("sideMenu");
menu=!menu;
m.style.left=menu?"0":"-250px";
}

function mostrar(id){
["estoque","os","mov"].forEach(x=>document.getElementById(x).classList.add("hidden"));
document.getElementById(id).classList.remove("hidden");
}

</script>

</body>
</html>
