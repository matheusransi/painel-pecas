<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Estoque</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/papaparse@5.4.1/papaparse.min.js"></script>

<style>
body{font-family:'Inter',sans-serif;margin:0;background:#0f0f10;color:#fff;}
header{background:#000;padding:22px;font-size:22px;font-weight:600;border-bottom:3px solid #e30613;}
.container{padding:30px;max-width:1300px;margin:auto;}
table{width:100%;border-collapse:collapse;margin-top:20px;}
th,td{padding:12px;border-bottom:1px solid #27272a;}

#menuBtn{
position:fixed;
top:20px;
left:20px;
background:#e30613;
border:none;
color:#fff;
padding:10px 12px;
border-radius:8px;
cursor:pointer;
z-index:20;
}

#sideMenu{
position:fixed;
top:0;
left:-220px;
width:220px;
height:100%;
background:#0b0b0c;
border-right:1px solid #27272a;
padding-top:80px;
transition:0.3s;
z-index:15;
}

#sideMenu a{
display:block;
padding:16px;
color:#fff;
text-decoration:none;
border-bottom:1px solid #1f1f23;
}

#sideMenu a:hover{
background:#e30613;
}
</style>
</head>

<body>

<button id="menuBtn" onclick="toggleMenu()">☰</button>

<div id="sideMenu">
<a href="index.html">Painel</a>
<a href="estoque.html">Estoque</a>
</div>

<header>Estoque</header>

<div class="container">

<table>
<thead>
<tr>
<th>NUMERAÇÃO</th>
<th>MARCA</th>
<th>MODELO</th>
<th>OS</th>
<th>PEÇA</th>
<th>CODIGO</th>
<th>VALOR</th>
<th>DATA RETIRADA</th>
<th>OS RECEPTOR</th>
<th>RESPONSAVEL</th>
</tr>
</thead>
<tbody id="tEstoque"></tbody>
</table>

</div>

<script>

function toggleMenu(){
let m=document.getElementById("sideMenu");
m.style.left = m.style.left === "0px" ? "-220px" : "0px";
}

const estoqueURL="https://docs.google.com/spreadsheets/d/e/2PACX-1vTzcuYj91nTsIkmp86gpPBW1REkCitAvBtiLVB4RQvRniDi_cj5Pmd4mcylqNiipw/pub?gid=1283911979&single=true&output=csv";

function verificarOS(valor){
if(!valor) return "SEM OS";
valor = valor.toLowerCase();
if(valor.includes("reservado")) return valor;
return "SEM OS";
}

function get(r,...keys){
for(let k of keys){
if(r[k] !== undefined) return r[k];
}
return "";
}

function carregarEstoque(){

Papa.parse(estoqueURL,{
download:true,
header:true,
skipEmptyLines:true,

complete:function(res){

let tabela=document.getElementById("tEstoque");
tabela.innerHTML="";

res.data.forEach(r=>{

let os=verificarOS(get(r,"OS","os"));

tabela.innerHTML+=`
<tr>
<td>${get(r,"NUMERAÇÃO","NUMERACAO","Numeração")}</td>
<td>${get(r,"MARCA","Marca")}</td>
<td>${get(r,"MODELO","Modelo")}</td>
<td>${os}</td>
<td>${get(r,"PEÇA","PECA","Peça")}</td>
<td>${get(r,"CODIGO","Código","Codigo")}</td>
<td>${get(r,"VALOR","Valor")}</td>
<td>${get(r,"DATA RETIRADA","Data Retirada")}</td>
<td>${get(r,"OS RECEPTOR","OS Receptor")}</td>
<td>${get(r,"RESPONSAVEL","Responsável","Responsavel")}</td>
</tr>
`;

});

}

});

}

carregarEstoque();

</script>

</body>
</html>
