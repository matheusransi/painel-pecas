<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Estoque Dashboard</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/papaparse@5.4.1/papaparse.min.js"></script>

<style>
body{font-family:'Inter',sans-serif;margin:0;background:#0b0b0c;color:#fff;}
header{padding:20px;font-size:22px;font-weight:600;border-bottom:2px solid #e30613;}
.container{padding:30px;max-width:1300px;margin:auto;}

.cards{display:grid;grid-template-columns:repeat(auto-fit,minmax(220px,1fr));gap:20px;margin-bottom:25px;}
.card{background:#121214;padding:20px;border-radius:16px;border:1px solid #1f1f23;}
.card h2{margin:5px 0 0;font-size:28px;color:#e30613;}

.actions{display:flex;gap:10px;margin-bottom:20px;}
.actions button{background:#18181b;border:1px solid #27272a;padding:10px 16px;border-radius:10px;color:#fff;cursor:pointer;}
.actions button:hover{background:#e30613;}

.section{display:none;}
.section.active{display:block;}

table{width:100%;border-collapse:collapse;margin-top:15px;}
th,td{padding:12px;border-bottom:1px solid #27272a;}

select{padding:10px;background:#18181b;color:#fff;border:1px solid #27272a;border-radius:10px;margin-bottom:10px;}

#menuBtn{position:fixed;top:20px;left:20px;background:#e30613;border:none;color:#fff;padding:10px;border-radius:8px;cursor:pointer;}
#sideMenu{position:fixed;top:0;left:-220px;width:220px;height:100%;background:#0b0b0c;border-right:1px solid #27272a;transition:0.3s;padding-top:80px;}
#sideMenu a{display:block;padding:16px;color:#fff;text-decoration:none;}
#sideMenu a:hover{background:#e30613;}
</style>
</head>

<body>

<button id="menuBtn" onclick="toggleMenu()">☰</button>

<div id="sideMenu">
<a href="index.html">Painel</a>
<a href="estoque.html">Estoque</a>
</div>

<header>Dashboard de Estoque</header>

<div class="container">

<div class="cards">
<div class="card"><span>Total peças</span><h2 id="total">0</h2></div>
<div class="card"><span>Retiradas hoje</span><h2 id="hoje">0</h2></div>
<div class="card"><span>Sem OS</span><h2 id="semOS">0</h2></div>
<div class="card"><span>Com OS</span><h2 id="comOS">0</h2></div>
<div class="card"><span>Total retiradas</span><h2 id="retiradas">0</h2></div>
</div>

<div class="actions">
<button onclick="mostrar('estoque')">Estoque</button>
<button onclick="mostrar('os')">Buscar OS</button>
<button onclick="mostrar('mov')">Movimento</button>
</div>

<div id="estoque" class="section">
<table>
<thead>
<tr><th>NUM</th><th>MARCA</th><th>MODELO</th><th>OS</th><th>PEÇA</th><th>RESP</th></tr>
</thead>
<tbody id="tEstoque"></tbody>
</table>
</div>

<div id="os" class="section">
<select id="osSelect" onchange="buscarOS()"></select>
<table>
<thead><tr><th>Peça</th><th>Responsável</th><th>Data</th></tr></thead>
<tbody id="tOS"></tbody>
</table>
</div>

<div id="mov" class="section">
<select id="dataSelect" onchange="filtrarData()"></select>
<table>
<thead><tr><th>Peça</th><th>Responsável</th><th>Data</th></tr></thead>
<tbody id="tHoje"></tbody>
</table>
</div>

</div>

<script>

let menuOpen=false;
function toggleMenu(){
let m=document.getElementById("sideMenu");
menuOpen=!menuOpen;
m.style.left = menuOpen ? "0px" : "-220px";
}

function mostrar(id){
document.querySelectorAll(".section").forEach(s=>s.classList.remove("active"));
document.getElementById(id).classList.add("active");
}

const url="https://docs.google.com/spreadsheets/d/e/2PACX-1vTzcuYj91nTsIkmp86gpPBW1REkCitAvBtiLVB4RQvRniDi_cj5Pmd4mcylqNiipw/pub?gid=1283911979&single=true&output=csv";

let dados=[];

function verificarOS(v){
if(!v) return false;
return v.toLowerCase().includes("reservado");
}

function carregar(){

Papa.parse(url,{
download:true,
header:false,
skipEmptyLines:true,

complete:function(res){

dados = res.data.slice(2);
dados = dados.filter(r => r[0] && r[0] !== "NUMERAÇÃO");

let t=document.getElementById("tEstoque");
let tHoje=document.getElementById("tHoje");

t.innerHTML="";
tHoje.innerHTML="";

let hojeStr=new Date().toLocaleDateString("pt-BR");

let total=0, hoje=0, semOS=0, comOS=0, retiradas=0;

dados.forEach(r=>{

let temOS=verificarOS(r[3]);

total++;

if(temOS) comOS++;
else semOS++;

if(r[7]) retiradas++;

t.innerHTML+=`<tr>
<td>${r[0]}</td>
<td>${r[1]}</td>
<td>${r[2]}</td>
<td>${temOS ? r[3] : "SEM OS"}</td>
<td>${r[4]}</td>
<td>${r[9]}</td>
</tr>`;

if(r[7]===hojeStr){
hoje++;
tHoje.innerHTML+=`<tr><td>${r[4]}</td><td>${r[9]}</td><td>${r[7]}</td></tr>`;
}

});

document.getElementById("total").innerText=total;
document.getElementById("hoje").innerText=hoje;
document.getElementById("semOS").innerText=semOS;
document.getElementById("comOS").innerText=comOS;
document.getElementById("retiradas").innerText=retiradas;

popularOS();
popularDatas();

}

});

}

function popularOS(){
let select=document.getElementById("osSelect");
select.innerHTML="<option>Escolha OS</option>";

let lista=[...new Set(dados.map(r=>r[8]))]; // OS receptor

lista.forEach(os=>{
if(os){
select.innerHTML+=`<option value="${os}">${os}</option>`;
}
});
}

function buscarOS(){
let os=document.getElementById("osSelect").value;
let t=document.getElementById("tOS");
t.innerHTML="";

dados.forEach(r=>{
if(r[8]===os && verificarOS(r[3])){
t.innerHTML+=`<tr><td>${r[4]}</td><td>${r[9]}</td><td>${r[7]}</td></tr>`;
}
});
}

function popularDatas(){
let select=document.getElementById("dataSelect");
select.innerHTML="<option>Escolha data</option>";

let lista=[...new Set(dados.map(r=>r[7]))];

lista.forEach(d=>{
if(d){
select.innerHTML+=`<option value="${d}">${d}</option>`;
}
});
}

function filtrarData(){
let data=document.getElementById("dataSelect").value;
let t=document.getElementById("tHoje");
t.innerHTML="";

dados.forEach(r=>{
if(r[7]===data){
t.innerHTML+=`<tr><td>${r[4]}</td><td>${r[9]}</td><td>${r[7]}</td></tr>`;
}
});
}

carregar();

</script>

</body>
</html>
