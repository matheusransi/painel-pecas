<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Estoque FINAL PRO</title>

<script src="https://cdn.jsdelivr.net/npm/papaparse@5.4.1/papaparse.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body{font-family:Arial;background:#0b0b0c;color:#fff;margin:0}

header{padding:20px;border-bottom:2px solid red;font-weight:600}

.container{padding:25px}

.cards{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(180px,1fr));
gap:12px;
}

.card{
background:#121214;
padding:15px;
border-radius:12px;
border:1px solid #222;
}

.section{
margin-top:25px;
transition:all .3s;
overflow:hidden;
}

.section.hidden{
max-height:0;
opacity:0;
margin:0;
padding:0;
}

.section:not(.hidden){
max-height:2000px;
opacity:1;
}

.actions{
margin-top:20px;
display:flex;
gap:10px;
}

.actions button.active{
background:red;
}

button{
background:#18181b;
border:1px solid #333;
color:#fff;
padding:10px;
border-radius:8px;
cursor:pointer;
}

button:hover{background:red}

table{width:100%;margin-top:10px;border-collapse:collapse}
td,th{padding:10px;border-bottom:1px solid #222}

#sideMenu{
position:fixed;
top:0;
left:-250px;
width:250px;
height:100%;
background:#0b0b0b;
transition:.3s;
}

.menu-item{
display:block;
padding:15px;
color:#fff;
text-decoration:none;
}

.menu-item:hover{background:red}
</style>
</head>

<body>

<button onclick="toggleMenu()" style="position:fixed;left:20px;top:20px;">☰</button>

<div id="sideMenu">
<a href="index.html" class="menu-item">Solicitação</a>
<a href="estoque.html" class="menu-item">Estoque</a>
<a href="registro.html" class="menu-item">Registro</a>
</div>

<header>Estoque</header>

<div class="container">

<div class="cards">
<div class="card">Total<h2 id="total"></h2></div>
<div class="card">Retiradas<h2 id="ret"></h2></div>
<div class="card">Hoje<h2 id="hoje"></h2></div>
</div>

<div class="actions">
<button id="btn-estoque" onclick="mostrar('estoque')">Estoque</button>
<button id="btn-os" onclick="mostrar('os')">Buscar OS</button>
<button id="btn-mov" onclick="mostrar('mov')">Movimento</button>
</div>

<div id="estoque" class="section hidden">
<table>
<tbody id="tEstoque"></tbody>
</table>
</div>

<div id="os" class="section hidden">

<div style="display:flex;gap:10px;">
<select id="osSelect" onchange="selecionarOS()"></select>

<input id="osInput" placeholder="Digite OS"
oninput="digitarOS()"
style="padding:8px;background:#18181b;color:#fff;border:1px solid #333;">
</div>

<div id="resumo"></div>
<table><tbody id="tOS"></tbody></table>
</div>

<div id="mov" class="section hidden">
<select id="dataSelect" onchange="filtrarData()"></select>
<table><tbody id="tMov"></tbody></table>
</div>

<div class="section">
<h3>Ranking</h3>
<table><tbody id="rankingTabela"></tbody></table>
</div>

</div>

<script>

let menu=false;
function toggleMenu(){
let m=document.getElementById("sideMenu");
menu=!menu;
m.style.left=menu?"0":"-250px";
}

function mostrar(id){

let el=document.getElementById(id);
let btn=document.getElementById("btn-"+id);

if(!el.classList.contains("hidden")){
el.classList.add("hidden");
btn.classList.remove("active");
return;
}

["estoque","os","mov"].forEach(x=>{
document.getElementById(x).classList.add("hidden");
document.getElementById("btn-"+x).classList.remove("active");
});

el.classList.remove("hidden");
btn.classList.add("active");
}

function selecionarOS(){
document.getElementById("osInput").value="";
buscarOS();
}

function digitarOS(){
document.getElementById("osSelect").selectedIndex=0;
buscarOS();
}

const url="https://docs.google.com/spreadsheets/d/e/2PACX-1vTzcuYj91nTsIkmp86gpPBW1REkCitAvBtiLVB4RQvRniDi_cj5Pmd4mcylqNiipw/pub?output=csv";

let dados=[];

function carregar(){

Papa.parse(url,{
download:true,
complete:(res)=>{

dados=res.data.slice(2);

let tabela="";
let carros={};

dados.forEach(r=>{

let saiu=r[9]&&r[9].trim()!=="";

tabela+=`<tr style="${saiu?'color:red':''}">
<td>${r[0]}</td>
<td>${r[1]}</td>
<td>${r[2]}</td>
<td>${r[4]}</td>
<td>${r[9]}</td>
</tr>`;

carros[r[1]]=(carros[r[1]]||0)+1;

});

document.getElementById("tEstoque").innerHTML=tabela;

let top=Object.entries(carros).slice(0,5);

let html="";
top.forEach(r=>{
html+=`<tr><td>${r[0]}</td><td>${r[1]}</td></tr>`;
});

document.getElementById("rankingTabela").innerHTML=html;

popularOS();
popularDatas();

}
});
}

function buscarOS(){

let os=document.getElementById("osInput").value || document.getElementById("osSelect").value;

let itens=dados.filter(r=>r[8]==os);

let html="";
itens.forEach(r=>{
html+=`<tr><td>${r[4]}</td><td>${r[9]}</td></tr>`;
});

document.getElementById("tOS").innerHTML=html;
}

function popularOS(){
let sel=document.getElementById("osSelect");
sel.innerHTML="<option>OS</option>";
[...new Set(dados.map(r=>r[8]))].forEach(o=>sel.innerHTML+=`<option>${o}</option>`);
}

function popularDatas(){
let sel=document.getElementById("dataSelect");
sel.innerHTML="<option>Data</option>";
[...new Set(dados.map(r=>r[7]))].forEach(d=>sel.innerHTML+=`<option>${d}</option>`);
}

function filtrarData(){
let d=document.getElementById("dataSelect").value;

let html="";
dados.forEach(r=>{
if(r[7]==d){
html+=`<tr><td>${r[4]}</td><td>${r[9]}</td></tr>`;
}
});

document.getElementById("tMov").innerHTML=html;
}

carregar();

</script>

</body>
</html>
