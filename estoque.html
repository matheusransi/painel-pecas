<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Estoque Dashboard</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/papaparse@5.4.1/papaparse.min.js"></script>

<style>
body{
font-family:'Inter',sans-serif;
margin:0;
background:#0b0b0c;
color:#fff;
}

header{
padding:20px;
font-size:22px;
font-weight:600;
border-bottom:1px solid #222;
display:flex;
justify-content:space-between;
align-items:center;
}

.container{
padding:30px;
max-width:1300px;
margin:auto;
}

.cards{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
gap:20px;
margin-bottom:25px;
}

.card{
background:#121214;
padding:20px;
border-radius:16px;
border:1px solid #1f1f23;
}

.card h2{
margin:5px 0 0 0;
font-size:28px;
}

.actions{
display:flex;
gap:10px;
margin-bottom:20px;
}

.actions button{
background:#18181b;
border:1px solid #27272a;
padding:10px 16px;
border-radius:10px;
color:#fff;
cursor:pointer;
}

.actions button:hover{
background:#e30613;
}

.section{display:none;}
.section.active{display:block;}

table{
width:100%;
border-collapse:collapse;
margin-top:15px;
}

th,td{
padding:12px;
border-bottom:1px solid #27272a;
}

select{
padding:10px;
background:#18181b;
color:#fff;
border:1px solid #27272a;
border-radius:10px;
}
</style>
</head>

<body>

<header>
<span>Dashboard de Estoque</span>
</header>

<div class="container">

<div class="cards">
<div class="card"><span>Total peças</span><h2 id="total">0</h2></div>
<div class="card"><span>Retiradas hoje</span><h2 id="hoje">0</h2></div>
<div class="card"><span>Sem OS</span><h2 id="semOS">0</h2></div>
<div class="card"><span>Com OS</span><h2 id="comOS">0</h2></div>
<div class="card"><span>Total retiradas</span><h2 id="retiradas">0</h2></div>
</div>

<div class="actions">
<button onclick="mostrar('estoque')">Estoque</button>
<button onclick="mostrar('os')">Buscar OS</button>
<button onclick="mostrar('mov')">Movimento do dia</button>
</div>

<div id="estoque" class="section">
<table>
<thead>
<tr>
<th>NUMERAÇÃO</th>
<th>MARCA</th>
<th>MODELO</th>
<th>OS</th>
<th>PEÇA</th>
<th>RESPONSAVEL</th>
</tr>
</thead>
<tbody id="tEstoque"></tbody>
</table>
</div>

<div id="os" class="section">
<select id="osSelect" onchange="buscarOS()"></select>
<table>
<thead>
<tr><th>Peça</th><th>Responsável</th><th>Data</th></tr>
</thead>
<tbody id="tOS"></tbody>
</table>
</div>

<div id="mov" class="section">
<input type="date" id="dataFiltro" onchange="filtrarPorData()" style="margin-bottom:10px;padding:8px;border-radius:8px;border:1px solid #333;background:#18181b;color:#fff;">
<table>
<thead>
<tr><th>Peça</th><th>Responsável</th><th>Data</th></tr>
</thead>
<tbody id="tHoje"></tbody>
</table>
</div>

</div>

<script>

function mostrar(id){
document.querySelectorAll(".section").forEach(s=>s.classList.remove("active"));
document.getElementById(id).classList.add("active");
}

const url="https://docs.google.com/spreadsheets/d/e/2PACX-1vTzcuYj91nTsIkmp86gpPBW1REkCitAvBtiLVB4RQvRniDi_cj5Pmd4mcylqNiipw/pub?gid=1283911979&single=true&output=csv";

let dados=[];

function verificarOS(v){
if(!v) return "SEM OS";
return v.toLowerCase().includes("reservado") ? v : "SEM OS";
}

function extrairNumeroOS(v){
if(!v) return null;
let num = v.toString().match(/\d+/);
return num ? num[0] : null;
}

function carregar(){

Papa.parse(url,{
download:true,
header:false,
skipEmptyLines:true,

complete:function(res){

dados = res.data.slice(2);
dados = dados.filter(r => r[0] && r[0] !== "NUMERAÇÃO");

let t=document.getElementById("tEstoque");
let tHoje=document.getElementById("tHoje");

t.innerHTML="";
tHoje.innerHTML="";
window.dadosGlobal = dados;

let hojeStr=new Date().toLocaleDateString("pt-BR");

let total=0, hoje=0, semOS=0, comOS=0, retiradas=0;

dados.forEach(r=>{

let os=verificarOS(r[3]);

total++;

if(os==="SEM OS") semOS++;
else comOS++;

if(r[7]) retiradas++;

t.innerHTML+=`<tr>
<td>${r[0]}</td>
<td>${r[1]}</td>
<td>${r[2]}</td>
<td>${os}</td>
<td>${r[4]}</td>
<td>${r[9]}</td>
</tr>`;

if(r[7]===hojeStr){
hoje++;
tHoje.innerHTML+=`<tr>
<td>${r[4]}</td>
<td>${r[9]}</td>
<td>${r[7]}</td>
</tr>`;
}

});

document.getElementById("total").innerText=total;
document.getElementById("hoje").innerText=hoje;
document.getElementById("semOS").innerText=semOS;
document.getElementById("comOS").innerText=comOS;
document.getElementById("retiradas").innerText=retiradas;

popularOS();

}

});

}

function popularOS(){
let select=document.getElementById("osSelect");
select.innerHTML="<option>Escolha OS</option>";

let lista=[...new Set(dados.map(r=>extrairNumeroOS(r[3])))];

lista.forEach(os=>{
if(os){
select.innerHTML+=`<option value="${os}">${os}</option>`;
}
});
}

function buscarOS(){
let os=document.getElementById("osSelect").value;
let t=document.getElementById("tOS");
t.innerHTML="";

dados.forEach(r=>{
let numero=extrairNumeroOS(r[3]);
if(numero===os){
t.innerHTML+=`<tr>
<td>${r[4]}</td>
<td>${r[9]}</td>
<td>${r[7]}</td>
</tr>`;
}
});
}


function filtrarPorData(){
let dataInput = document.getElementById("dataFiltro").value;
let tHoje=document.getElementById("tHoje");
tHoje.innerHTML="";

if(!dataInput) return;

let dataFormatada = new Date(dataInput).toLocaleDateString("pt-BR");

window.dadosGlobal.forEach(r=>{
if(r[7]===dataFormatada){
tHoje.innerHTML+=`<tr>
<td>${r[4]}</td>
<td>${r[9]}</td>
<td>${r[7]}</td>
</tr>`;
}
});
}

carregar();


</script>

</body>
</html>
