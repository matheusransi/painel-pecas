<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Estoque</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/papaparse@5.4.1/papaparse.min.js"></script>

<style>
body{font-family:'Inter',sans-serif;margin:0;background:#0f0f10;color:#fff;}
header{background:#000;padding:22px;font-size:22px;font-weight:600;border-bottom:3px solid #e30613;}
.container{padding:30px;max-width:1300px;margin:auto;}
table{width:100%;border-collapse:collapse;margin-top:20px;}
th,td{padding:12px;border-bottom:1px solid #27272a;}
</style>
</head>

<body>

<header>Estoque</header>

<div class="container">

<table>
<thead>
<tr>
<th>NUMERAÇÃO</th>
<th>MARCA</th>
<th>MODELO</th>
<th>OS</th>
<th>PEÇA</th>
<th>CODIGO</th>
<th>VALOR</th>
<th>DATA RETIRADA</th>
<th>OS RECEPTOR</th>
<th>RESPONSAVEL</th>
</tr>
</thead>
<tbody id="tEstoque"></tbody>
</table>

</div>

<script>

const estoqueURL="https://docs.google.com/spreadsheets/d/e/2PACX-1vTzcuYj91nTsIkmp86gpPBW1REkCitAvBtiLVB4RQvRniDi_cj5Pmd4mcylqNiipw/pub?gid=1283911979&single=true&output=csv";

function verificarOS(valor){
if(!valor) return "SEM OS";
valor=valor.toLowerCase();
if(valor.includes("reservado")) return valor;
return "SEM OS";
}

function carregarEstoque(){
Papa.parse(estoqueURL,{
download:true,
header:true,
skipEmptyLines:true,
complete:function(res){

if(!res.data || res.data.length===0){
alert("ERRO: Planilha não carregou");
return;
}

let t=document.getElementById("tEstoque");
t.innerHTML="";

res.data.forEach(r=>{
let os=verificarOS(r["OS"]||"");
t.innerHTML+=`
<tr>
<td>${r["NUMERAÇÃO"]||r["NUMERACAO"]||""}</td>
<td>${r["MARCA"]||""}</td>
<td>${r["MODELO"]||""}</td>
<td>${os}</td>
<td>${r["PEÇA"]||r["PECA"]||""}</td>
<td>${r["CODIGO"]||""}</td>
<td>${r["VALOR"]||""}</td>
<td>${r["DATA RETIRADA"]||""}</td>
<td>${r["OS RECEPTOR"]||""}</td>
<td>${r["RESPONSAVEL"]||""}</td>
</tr>`;
});

}
});
}

carregarEstoque();

</script>

</body>
</html>
