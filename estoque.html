<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Estoque </title>
<script src="https://cdn.jsdelivr.net/npm/papaparse@5.4.1/papaparse.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&display=swap" rel="stylesheet">

<style>
body{font-family:Inter;background:#0b0b0c;color:#fff;margin:0}
header{padding:20px;border-bottom:2px solid #e30613;font-weight:600}
.container{padding:25px}
.cards{display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:12px}
.card{background:#121214;padding:15px;border-radius:12px;border:1px solid #222}
.card h2{color:#e30613;margin:5px 0}
.section{margin-top:25px}
table{width:100%;border-collapse:collapse;margin-top:10px}
th,td{padding:10px;border-bottom:1px solid #222;text-align:left}
th{color:#aaa}
select{padding:8px;background:#18181b;color:#fff;border:1px solid #333;border-radius:8px}
button{background:#18181b;border:1px solid #333;color:#fff;padding:8px 12px;border-radius:8px;cursor:pointer}
button:hover{background:#e30613}
.actions{margin-top:20px;display:flex;gap:10px}
.actions button.active{background:#e30613;border-color:#e30613;}
.hidden{display:none}
canvas{background:#121214;padding:10px;border-radius:12px}

#sideMenu{
position:fixed;
top:0;
left:-250px;
width:250px;
height:100%;
background:#0b0b0b;
transition:0.3s;
z-index:999;
border-right:1px solid #222;
padding-top:60px;
}

.menu-item{
display:block;
padding:15px;
color:#fff;
text-decoration:none;
}
.menu-item:hover{background:#e30613;}
.menu-item.active{background:#e30613;}

/* 🔥 NOVO: CARDS */
.grid-cards{
display:grid;
grid-template-columns:repeat(auto-fill,minmax(250px,1fr));
gap:15px;
margin-top:15px;
}

.card-item{
background:#121214;
border:1px solid #222;
border-radius:12px;
padding:15px;
transition:0.2s;
}

.card-item:hover{
transform:translateY(-3px);
border-color:#e30613;
}
</style>
</head>

<body>

<div id="sideMenu">
<div style="display:flex;justify-content:space-between;align-items:center;padding:15px;">
<span style="font-weight:bold;">Menu</span>
<button onclick="toggleMenu()" style="background:none;border:none;color:#fff;font-size:20px;">✕</button>
</div>

<a href="index.html" class="menu-item">Solicitação de Peças</a>
<a href="estoque.html" class="menu-item active">Estoque</a>
<a href="registro.html" class="menu-item">Registro de Peça</a>
</div>

<header style="display:flex;align-items:center;gap:15px;">
<button onclick="toggleMenu()" style="background:transparent;border:none;color:#fff;font-size:22px;">☰</button>
<h2 style="margin:0;">Estoque</h2>
</header>

<header>Dashboard Completo + Inteligência</header>

<div class="container">

<div class="cards">
<div class="card">Total<h2 id="total"></h2></div>
<div class="card">Retiradas<h2 id="ret"></h2></div>
<div class="card">Hoje<h2 id="hoje"></h2></div>
<div class="card">Sem OS<h2 id="sem" style="color:#ff3b3b"></h2></div>
<div class="card">Reservado<h2 id="com" style="color:#00ff88"></h2></div>
</div>

<div class="actions">
<button id="btn-estoque" onclick="mostrar('estoque')">Estoque</button>
<button id="btn-os" onclick="mostrar('os')">Buscar OS</button>
<button id="btn-mov" onclick="mostrar('mov')">Movimento</button>
</div>

<div id="estoque" class="section hidden">

<!-- 🔥 NOVO: FILTROS -->
<div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:10px;margin-bottom:10px;">
<select id="filtroOS" onchange="filtrarAvancado()"></select>
<select id="filtroMarca" onchange="filtrarAvancado()"></select>
<select id="filtroModelo" onchange="filtrarAvancado()"></select>
<input id="filtroPeca" placeholder="Buscar peça..." oninput="filtrarAvancado()">
</div>

<table>
<thead><tr><th>NUM</th><th>MARCA</th><th>MODELO</th><th>OS</th><th>PEÇA</th><th>RESP</th></tr></thead>
<tbody id="tEstoque"></tbody>
</table>

<!-- 🔥 NOVO: CARDS -->
<div id="cardsEstoque" class="grid-cards"></div>

</div>

<div id="os" class="section hidden">
<div style="display:flex;gap:10px;">
<select id="osSelect" onchange="selecionarOS()"></select>
<input id="osInput" oninput="digitarOS()">
</div>
<div id="resumo"></div>
<table><tbody id="tOS"></tbody></table>
</div>

<div id="mov" class="section hidden">
<select id="dataSelect" onchange="filtrarData()"></select>
<table><tbody id="tMov"></tbody></table>
</div>

<div class="section">
<h3>Ranking Top 5 carros</h3>
<table><tbody id="rankingTabela"></tbody></table>
</div>

<div class="section">
<canvas id="grafico"></canvas>
</div>

</div>

<script>

// 🔥 NOVO: FILTRO + CARDS
function filtrarAvancado(){
let os=filtroOS.value.toLowerCase();
let marca=filtroMarca.value.toLowerCase();
let modelo=filtroModelo.value.toLowerCase();
let peca=filtroPeca.value.toLowerCase();

document.querySelectorAll("#tEstoque tr").forEach(l=>{
let t=l.innerText.toLowerCase();
l.style.display =
(!os||t.includes(os)) &&
(!marca||t.includes(marca)) &&
(!modelo||t.includes(modelo)) &&
(!peca||t.includes(peca))
? "" : "none";
});

document.querySelectorAll(".card-item").forEach(c=>{
let t=c.dataset.text;
c.style.display =
(!os||t.includes(os)) &&
(!marca||t.includes(marca)) &&
(!modelo||t.includes(modelo)) &&
(!peca||t.includes(peca))
? "" : "none";
});
}

// 🔥 RESTANTE DO SEU CÓDIGO IGUAL + ADIÇÃO DOS CARDS NO FINAL DO LOOP

// 👉 DENTRO DO carregar(), logo após criar "tabela+="
// adiciona:

// cards
let cards="";
dados.forEach(r=>{
cards+=`
<div class="card-item" data-text="${r.join(" ").toLowerCase()}">
<div><b>${r[4]}</b></div>
<div style="font-size:12px;color:#aaa">${r[1]} • ${r[2]}</div>
<div style="font-size:12px;">NUM: ${r[0]}</div>
<div style="font-size:12px;">OS: ${r[3]||"SEM OS"}</div>
<div style="font-size:12px;">RESP: ${r[9]||"-"}</div>
</div>`;
});
document.getElementById("cardsEstoque").innerHTML=cards;

</script>

</body>
</html>
